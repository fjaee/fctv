name: Update IPTV M3U

on:
  schedule:
    - cron: '0 0,12 * * *' # Runs at midnight and noon everyday
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Run generator script
        run: python generate.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add channels-all.m3u channels-drm.m3u
          # Commit only if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-updated IPTV M3U playlists" && git push)

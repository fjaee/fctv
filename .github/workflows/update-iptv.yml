name: Update IPTV Playlist

on:
  schedule:
    # 16:00 UTC Saturday = 12:00 AM Midnight Sunday in PHST
    - cron: '0 16 * * 6'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute script
        run: python generate.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add channels-all.m3u channels-backup.json channels.hash commit_msg.txt
          
          if ! git diff --staged --quiet; then
            if [ -f commit_msg.txt ]; then
              git commit -F commit_msg.txt
            else
              git commit -m "Auto-update IPTV channels and EPG"
            fi
            git push
            echo "Successfully pushed updated channels."
          else
            echo "No changes detected. Skipping push."
          fi
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FC TV — Live Channels</title>
<style>
:root{--red:#e50914;--dark:#0f0f0f;--card:#1a1a1a;--card-hover:#2a2a2a;--text:#e5e5e5;--muted:#888;--nav-h:64px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;overflow-x:hidden}
#navbar{position:fixed;top:0;left:0;right:0;height:var(--nav-h);display:flex;align-items:center;padding:0 32px;gap:32px;background:linear-gradient(to bottom,rgba(0,0,0,.95) 0%,transparent 100%);z-index:1000;transition:background .3s}
#navbar.solid{background:rgba(0,0,0,.97)}
.logo{font-size:26px;font-weight:900;letter-spacing:2px;color:var(--red);text-shadow:0 0 20px rgba(229,9,20,.5);user-select:none;flex-shrink:0}
.nav-cats{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.nav-cats::-webkit-scrollbar{display:none}
.nav-cats a{padding:6px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .25s;font-weight:500;color:var(--muted);font-size:13px;text-decoration:none}
.cat-btn.active{color:#fff;background:var(--red)}
.cat-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
#search{background:none;border:none;color:#fff;font-size:13px;outline:none;width:160px}
.hero{background-position:absolute;inset:0;background:linear-gradient(135deg,#1a0a0a 0%,#0d0d1a 50%,#0a0a0d 100%)}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to top,var(--dark) 0%,transparent 40%,transparent 70%,var(--dark) 100%)}
.hero-content{position:relative;z-index:2;padding:0 48px 48px;max-width:600px}
.hero-bg{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;opacity:.3;filter:blur(2px)brightness(.6)}
.hero-title{font-size:42px;font-weight:900;line-height:1.1;margin-bottom:10px;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.hero-cat{font-size:14px;color:var(--red);font-weight:700;padding:6px 10px;border-radius:4px;letter-spacing:1px;display:inline-block;margin-bottom:16px;text-transform:uppercase}
.hero-btn{display:inline-flex;align-items:center;gap:8px;background:var(--red);color:#fff;border:none;border-radius:4px;cursor:pointer;padding:12px 24px;font-weight:900;font-size:16px;transition:all .2s}
.hero-btn:hover{transform:scale(1.05)}
.content{position:relative;z-index:2;padding:0 48px 48px;max-width:600px}
.section-wrap{padding:0 48px;margin-bottom:40px}
.section-title{font-size:20px;font-weight:700;margin-bottom:16px;padding-bottom:4px;border-bottom:2px solid var(--red);display:inline-block}
.row{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:16px}
.row::-webkit-scrollbar{display:none}
.channel-card{min-width:200px;max-width:200px;background:var(--card);border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .3s,box-shadow .3s}
.channel-card:hover{transform:scale(1.05);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.channel-card img{width:100%;height:112px;object-fit:contain;background:#000;padding:8px}
.channel-card h4{padding:12px;font-size:14px;font-weight:600;text-align:center}
#player-overlay{display:none;position:fixed;inset:0;background:#000;z-index:2000}
#player-overlay.active{display:flex;flex-direction:column}
#player-header{height:48px;background:rgba(0,0,0,.8);display:flex;align-items:center;padding:0 16px;gap:16px}
#player-title{flex:1;font-size:16px;font-weight:600}
#close-player{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:8px}
#video-container{flex:1;position:relative;background:#000}
video{width:100%;height:100%;object-fit:contain}
#player-controls{height:80px;background:rgba(0,0,0,.9);display:flex;align-items:center;padding:0 24px;gap:16px}
.ctrl-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:8px;transition:color .2s}
.ctrl-btn:hover{color:var(--red)}
#vol-slider,#seek-slider{width:120px}
#loader{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
#loader .logo{font-size:48px;margin-bottom:24px}
.progress{width:200px;height:4px;background:#333;border-radius:2px;overflow:hidden;margin-top:16px}
.progress-bar{height:100%;background:var(--red);width:0%;animation:load 2s ease-in-out infinite}
@keyframes load{0%,100%{width:0%}50%{width:100%}}
#loader-text{margin-top:16px;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<div id="loader">
<div class="logo">FC TV</div>
<div class="progress"><div class="progress-bar"></div></div>
<div id="loader-text">Loading player...</div>
</div>
<nav id="navbar">
<div class="logo">FC TV</div>
<div class="nav-cats" id="nav-cats"></div>
</nav>
<div id="hero"></div>
<div id="sections"></div>
<div id="player-overlay">
<div id="player-header">
<div id="player-title">Channel</div>
<button id="close-player">&times;</button>
</div>
<div id="video-container">
<video id="video" controls></video>
</div>
</div>
<script>
let channels=[],player,activeCategory='All';
const categories=['All','News','Entertainment','Sports','Movies','Kids','Music','Documentary'];

function bootApp(){
if(!window.shaka){setTimeout(bootApp,100);return;}
shaka.polyfill.installAll();
if(!shaka.Player.isBrowserSupported()){document.getElementById('loader-text').textContent='Browser not supported';return;}
initApp();}

function initApp(){
loadChannels();document.getElementById('close-player').onclick=()=>{
document.getElementById('player-overlay').classList.remove('active');
if(player){player.unload();}};
window.addEventListener('scroll',()=>{
const nav=document.getElementById('navbar');
if(window.scrollY>100)nav.classList.add('solid');else nav.classList.remove('solid');});}

async function loadChannels(){
try{
const res=await fetch('https://raw.githubusercontent.com/noodtayo/app/refs/heads/main/channels.json');
channels=await res.json();
buildNav();
setupHero();
renderSections();
document.getElementById('loader').style.display='none';
}catch(e){
document.getElementById('loader-text').textContent='Failed to load channels: '+e.message;}}

function buildNav(){
const nav=document.getElementById('nav-cats');
categories.forEach(cat=>{
const a=document.createElement('a');
a.className='cat-btn'+(cat==='All'?' active':'');
a.textContent=cat;
a.onclick=()=>filterCategory(cat);
nav.appendChild(a);});}

function filterCategory(cat){
activeCategory=cat;
document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
document.querySelector(`.cat-btn:nth-child(${categories.indexOf(cat)+1})`).classList.add('active');
renderSections();}

function setupHero(){
if(!channels.length)return;
const hero=channels[Math.floor(Math.random()*channels.length)];
const heroEl=document.getElementById('hero');
heroEl.innerHTML=`<div class="hero">
<img class="hero-bg" src="${hero.logo||''}" alt=""/>
<div class="hero-grad"></div>
<div class="hero-content" style="padding-top:calc(var(--nav-h) + 80px)">
<div class="hero-cat">${hero.category||'Featured'}</div>
<h1 class="hero-title">${hero.name}</h1>
<button class="hero-btn" onclick="playChannel('${hero.name.replace(/'/g,"\\'")}')">▶ Watch Now</button>
</div></div>`;}

function renderSections(){
const container=document.getElementById('sections');
const filtered=activeCategory==='All'?channels:channels.filter(c=>c.category===activeCategory);
const byCat={};
filtered.forEach(ch=>{
const cat=ch.category||'Other';
if(!byCat[cat])byCat[cat]=[];
byCat[cat].push(ch);});
container.innerHTML='';
Object.keys(byCat).forEach(cat=>{
const section=document.createElement('div');
section.className='section-wrap';
const title=document.createElement('h2');
title.className='section-title';
title.textContent=cat;
section.appendChild(title);
const row=document.createElement('div');
row.className='row';
byCat[cat].forEach(ch=>{
const card=document.createElement('div');
card.className='channel-card';
card.innerHTML=`<img src="${ch.logo||''}" alt="${ch.name}"/><h4>${ch.name}</h4>`;
card.onclick=()=>playChannel(ch.name);
row.appendChild(card);});
section.appendChild(row);
container.appendChild(section);});}

function playChannel(name){
const ch=channels.find(c=>c.name===name);
if(!ch)return;
document.getElementById('player-overlay').classList.add('active');
document.getElementById('player-title').textContent=ch.name;
const video=document.getElementById('video');
if(!player)player=new shaka.Player(video);
player.configure({drm:{clearKeys:{}}});
if(ch.drm){
const keys={};
if(ch.drm.keys&&Array.isArray(ch.drm.keys)){
ch.drm.keys.forEach(jwk=>{
if(jwk.kid&&jwk.k){
const kid=jwk.kid.replace(/-/g,'+').replace(/_/g,'/');
const k=jwk.k.replace(/-/g,'+').replace(/_/g,'/');
keys[kid]=k;
}
});
}else if(ch.drm.clearkey){
if(Array.isArray(ch.drm.clearkey)){
ch.drm.clearkey.forEach(pair=>{
if(pair.kid&&pair.key)keys[pair.kid]=pair.key;
});
}else if(typeof ch.drm.clearkey==='object'){
Object.assign(keys,ch.drm.clearkey);
}
}else{
Object.assign(keys,ch.drm);
}
if(Object.keys(keys).length>0){
player.configure({drm:{clearKeys:keys}});
}
}
const netConfig={networkingEngine:player.getNetworkingEngine()};
if(ch.headers){
const headers={};
if(typeof ch.headers==='string'){
ch.headers.split('\\n').forEach(line=>{
const [k,v]=line.split(':');
if(k&&v)headers[k.trim()]=v.trim();});
}else Object.assign(headers,ch.headers);
player.getNetworkingEngine().registerRequestFilter((type,request)=>{
Object.assign(request.headers,headers);});}
player.load(ch.streamUrl).catch(e=>alert('Playback error: '+e.message));}

const script=document.createElement('script');
script.src='https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js';
script.onload=bootApp;
script.onerror=()=>document.getElementById('loader-text').textContent='Failed to load player library';
document.head.appendChild(script);
</script>
</body>
</html>
